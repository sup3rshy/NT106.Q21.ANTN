name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    # WPF in NetDraw.Client targets net8.0-windows, so the solution can only build on Windows.
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # SDK 10 is required to parse NetDraw.slnx; SDK 8 fails with MSB4068.
      # Project TFMs stay on net8.0 — the SDK is only the build driver.
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - run: dotnet --info

      - name: Restore
        run: dotnet restore NetDraw.slnx

      - name: Build
        run: dotnet build NetDraw.slnx --no-restore --configuration Release
